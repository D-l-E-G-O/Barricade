<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barricade</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-panel">
            <h1>Barricade</h1>
            <div class="game-info">
                <div id="p1-info" class="player-info active">
                    <div class="avatar p1-avatar"></div>
                    <div>
                        <h3>Player 1</h3>
                        <p>Walls: <span id="p1-walls">10</span></p>
                    </div>
                </div>
                <div id="turn-indicator" class="turn-indicator">
                    P1 Turn
                </div>
                <div id="p2-info" class="player-info">
                    <div>
                        <h3 style="text-align: right">Player 2</h3>
                        <p style="text-align: right">Walls: <span id="p2-walls">10</span></p>
                    </div>
                    <div class="avatar p2-avatar"></div>
                </div>
            </div>
        </header>

        <main class="game-area">
            <div id="board" class="board glass-panel">
            </div>
        </main>
        
        <div id="toast" class="toast hidden">Invalid Move</div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
